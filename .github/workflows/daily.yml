name: Daily curation

on:
  # 06:00 UTC every day. Wikipedia's "on this day" rolls over at UTC.
  schedule:
    - cron: "0 6 * * *"
  # Manual run for the current day (or override MUSEUM_DATE in the UI).
  workflow_dispatch:
  # Also run on every push, so editing the curator script can be tested live.
  push:
    branches: [main]
    paths:
      - "scripts/curator.py"
      - ".github/workflows/daily.yml"

concurrency:
  group: museum-curator
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MUSEUM_REPO_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run curator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          WAVESPEED_AI_API_KEY: ${{ secrets.WAVESPEED_AI_API_KEY }}
        run: python scripts/curator.py

      - name: Commit today's exhibit
        run: |
          git config user.name "museum-curator[bot]"
          git config user.email "museum-curator[bot]@users.noreply.github.com"
          git add gallery/
          if git diff --cached --quiet; then
            echo "No new exhibit to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "curate: hang today's painting ($DATE)"
          git push
