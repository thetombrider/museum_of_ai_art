name: Deploy Pages

# Builds the static site in ./gallery and deploys it to GitHub Pages.
# Triggers:
#   - push to main: rebuild whenever the curator commits a new painting
#   - workflow_dispatch: manual rebuild from the Actions tab

on:
  push:
    branches: [main]
  workflow_dispatch:

# Hard requirement: allow only one Pages deployment at a time, and never
# cancel a build that's already in flight.
concurrency:
  group: museum-pages
  cancel-in-progress: false

permissions:
  pages: write        # required to deploy to GitHub Pages
  id-token: write     # required for OIDC verification by the deploy action
  contents: read      # required to checkout the repo

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site lives in ./gallery, served as the site root.
          path: gallery

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
